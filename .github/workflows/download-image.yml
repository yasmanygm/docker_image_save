name: Descargar imagen de Docker

on:
  workflow_dispatch:
    inputs:
      image_name:
        description: 'Nombre imagen docker'
        required: true
        default: 'paddlepaddle/paddle'
      image_tag:
        description: 'Tag de imagen docker'
        required: true
        default: '2.6.2'
      filename:
        description: 'Nombre de archivo a guardar'
        required: true
        default: 'imagen.tar'

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
    - name: Instalar Skopeo
      run: |
        sudo apt-get update
        sudo apt-get install -y skopeo

    - name: Descargar imagen de Docker Hub
      run: |
        skopeo copy \
          docker://docker.io/${{ github.event.inputs.image_name }}:${{ github.event.inputs.image_tag }} \
          docker-archive:${{ github.event.inputs.filename }}

    - name: Verificar archivo creado
      run: |
        ls -lh
        file ${{ github.event.inputs.filename }}

    - name: Crear nombre de artefacto válido (sin barras /)
      id: sanitize
      run: |
        # Reemplazar / por - para evitar errores
        ARTIFACT_NAME="${{ github.event.inputs.image_name }}-${{ github.event.inputs.image_tag }}"
        ARTIFACT_NAME=$(echo "$ARTIFACT_NAME" | sed 's/\//-/g')
        echo "artifact_name=$ARTIFACT_NAME" >> $GITHUB_OUTPUT
        echo "Nombre limpio: $ARTIFACT_NAME"

    - name: Subir archivo como artefacto
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.sanitize.outputs.artifact_name }}
        path: ${{ github.event.inputs.filename }}
        retention-days: 7
